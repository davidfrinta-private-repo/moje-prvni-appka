<!DOCTYPE html>
<html>
<head>
    <title>Moje appka</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background: white;
            color: black;
        }

        .dark {
            background: #121212;
            color: white;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            margin: 5px;
        }
    </style>
</head>
<body id="body">

    <h1>Dark Mode Appka 🌙</h1>

    <button onclick="toggleDark()">Přepnout Dark Mode</button>

    <script>
        function toggleDark() {
            let body = document.getElementById("body");
            body.classList.toggle("dark");
        }
    </script>

</body>
</html>
